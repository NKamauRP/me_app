name: me_app
description: "ME - a minimal gamified personal journal MVP."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  audioplayers: ^6.5.0
  confetti: ^0.8.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  in_app_update: ^4.2.3
  path: ^1.9.1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
