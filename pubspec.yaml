name: me_app
description: "ME - a minimal gamified personal journal MVP."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  audioplayers: ^6.5.0
  confetti: ^0.7.0
  dio: ^5.4.3
  flutter:
    sdk: flutter
  flutter_gemma: ^0.4.0
  flutter_local_notifications: ^17.2.2
  fl_chart: ^0.68.0
  http: ^1.2.1
  in_app_update: ^4.2.3
  intl: ^0.19.0
  path: ^1.9.1
  path_provider: ^2.1.3
  provider: ^6.1.5
  share_plus: ^10.0.2
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  timezone: ^0.9.4
  uuid: ^4.4.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/sounds/
